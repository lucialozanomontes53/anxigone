<div class="waiting-setup">
  <label class="waiting-setup__label" for="waiting-goal">¿Qué impulso quieres posponer?</label>
  <input
    id="waiting-goal"
    type="text"
    class="waiting-setup__input"
    [value]="goal()"
    (input)="onGoalInput($event)"
    placeholder="Enviar el mensaje, llamar, revisar su perfil…"
  />

  <p class="waiting-setup__label">¿Cuánto quieres esperar?</p>
  <div class="waiting-setup__durations" role="group" aria-label="Duración de la espera en minutos">
    @for (minutes of durationOptions; track minutes) {
      <button
        type="button"
        class="waiting-setup__duration-chip"
        [class.waiting-setup__duration-chip--selected]="timerDurationMin() === minutes"
        [attr.aria-pressed]="timerDurationMin() === minutes"
        (click)="selectDuration(minutes)"
      >
        {{ minutes }} min
      </button>
    }
  </div>

  <button
    type="button"
    class="button button--primary button--block"
    (click)="submit()"
    [disabled]="!canSubmit()"
  >
    Empezar la espera
  </button>
</div>
