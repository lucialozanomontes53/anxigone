<div class="victories-dashboard">
  <div class="victories-dashboard__stat">
    <p class="victories-dashboard__value">{{ weekCount() }}</p>
    <p class="victories-dashboard__label">Esta semana</p>
  </div>
  <div class="victories-dashboard__stat">
    <p class="victories-dashboard__value">{{ monthCount() }}</p>
    <p class="victories-dashboard__label">Este mes</p>
  </div>
  <div class="victories-dashboard__stat">
    <p class="victories-dashboard__value">{{ currentStreak() }}</p>
    <p class="victories-dashboard__label">Racha (días)</p>
  </div>
  <div class="victories-dashboard__stat">
    <p class="victories-dashboard__value">{{ totalCount() }}</p>
    <p class="victories-dashboard__label">Total</p>
  </div>
</div>
