<nav class="bottom-nav" aria-label="Navegación principal">
  @for (item of items; track item.id) {
    <a
      class="bottom-nav__item"
      [class.bottom-nav__item--emergency]="item.id === 'emergency'"
      [routerLink]="item.path"
      routerLinkActive="bottom-nav__item--active"
    >
      <span class="bottom-nav__icon" aria-hidden="true">
        @switch (item.id) {
          @case ('emergency') {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="9" />
              <line x1="12" y1="7.5" x2="12" y2="13" />
              <circle cx="12" cy="16.5" r="0.75" fill="currentColor" stroke="none" />
            </svg>
          }
          @case ('tools') {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="9" width="18" height="10" rx="2" />
              <path d="M8 9V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v3" />
              <line x1="3" y1="13.5" x2="21" y2="13.5" />
            </svg>
          }
          @case ('journal') {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="4" y="3" width="16" height="18" rx="2" />
              <line x1="8" y1="8" x2="16" y2="8" />
              <line x1="8" y1="12" x2="16" y2="12" />
              <line x1="8" y1="16" x2="13" y2="16" />
            </svg>
          }
          @case ('organizer') {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="7" height="7" rx="1" />
              <rect x="14" y="4" width="7" height="7" rx="1" />
              <rect x="3" y="15" width="7" height="5" rx="1" />
              <rect x="14" y="15" width="7" height="5" rx="1" />
            </svg>
          }
        }
      </span>
      <span class="bottom-nav__label">{{ item.label }}</span>
    </a>
  }
</nav>
